<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Lens end (wide) -->
  <ellipse cx="12" cy="32" rx="5" ry="10" fill="#003591"/>
  <ellipse cx="12" cy="32" rx="3.5" ry="8" fill="#89b4f0" opacity="0.5"/>
  <ellipse cx="11" cy="29" rx="1.5" ry="3" fill="white" opacity="0.5" transform="rotate(-10 11 29)"/>
  <!-- Brass ring at lens -->
  <ellipse cx="16" cy="32" rx="2" ry="10.5" fill="#C47F00"/>
  <!-- First tube section -->
  <rect x="16" y="24" width="16" height="16" rx="2" fill="#8B5E3C"/>
  <rect x="17" y="25.5" width="14" height="13" rx="1.5" fill="#A0724E"/>
  <!-- Brass ring mid -->
  <ellipse cx="32" cy="32" rx="2" ry="9" fill="#C47F00"/>
  <!-- Second tube section (narrower) -->
  <rect x="32" y="25.5" width="14" height="13" rx="2" fill="#6B4226"/>
  <rect x="33" y="27" width="12" height="10" rx="1.5" fill="#8B5E3C"/>
  <!-- Brass ring at eyepiece -->
  <ellipse cx="46" cy="32" rx="2" ry="8" fill="#C47F00"/>
  <!-- Eyepiece -->
  <rect x="46" y="26" width="8" height="12" rx="2" fill="#4A2E14"/>
  <rect x="47" y="27.5" width="6" height="9" rx="1.5" fill="#6B4226"/>
  <!-- Eyepiece rim -->
  <ellipse cx="54" cy="32" rx="1.5" ry="7" fill="#C47F00"/>
  <!-- Highlight streak -->
  <line x1="18" y1="26" x2="44" y2="26" stroke="white" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
</svg>
