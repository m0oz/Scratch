<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Left barrel -->
  <rect x="8" y="14" width="18" height="36" rx="9" fill="#003591"/>
  <rect x="10" y="16" width="14" height="32" rx="7" fill="#1a4a9e"/>
  <!-- Right barrel -->
  <rect x="38" y="14" width="18" height="36" rx="9" fill="#003591"/>
  <rect x="40" y="16" width="14" height="32" rx="7" fill="#1a4a9e"/>
  <!-- Bridge -->
  <rect x="22" y="24" width="20" height="8" rx="4" fill="#C47F00"/>
  <rect x="24" y="26" width="16" height="4" rx="2" fill="#D4A060"/>
  <!-- Left lens -->
  <ellipse cx="17" cy="16" rx="8" ry="4" fill="#003591"/>
  <ellipse cx="17" cy="16" rx="6" ry="3" fill="#89b4f0"/>
  <ellipse cx="15" cy="15" rx="2.5" ry="1.5" fill="white" opacity="0.5"/>
  <!-- Right lens -->
  <ellipse cx="47" cy="16" rx="8" ry="4" fill="#003591"/>
  <ellipse cx="47" cy="16" rx="6" ry="3" fill="#89b4f0"/>
  <ellipse cx="45" cy="15" rx="2.5" ry="1.5" fill="white" opacity="0.5"/>
  <!-- Brass rings -->
  <ellipse cx="17" cy="16" rx="8" ry="4" fill="none" stroke="#C47F00" stroke-width="1.5"/>
  <ellipse cx="47" cy="16" rx="8" ry="4" fill="none" stroke="#C47F00" stroke-width="1.5"/>
  <!-- Eyepieces -->
  <rect x="11" y="48" width="12" height="5" rx="2.5" fill="#C47F00"/>
  <rect x="41" y="48" width="12" height="5" rx="2.5" fill="#C47F00"/>
</svg>
