name: Deploy Web Prototypes

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all web projects
        run: |
          set -e
          mkdir -p _site
          repo_name="${GITHUB_REPOSITORY#*/}"

          for dir in web/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")

            # Skip _template and other underscore dirs
            [[ "$name" == _* ]] && continue

            echo "::group::Processing $name"

            if [ -f "${dir}package.json" ]; then
              echo "Building $name..."
              (
                cd "$dir"
                npm install
                VITE_BASE="/$repo_name/web/$name/" npm run build
              )
              if   [ -d "${dir}dist" ]; then cp -r "${dir}dist" "_site/$name"
              elif [ -d "${dir}out"  ]; then cp -r "${dir}out"  "_site/$name"
              else echo "WARNING: no dist/ or out/ found for $name, skipping"
              fi
            elif [ -f "${dir}index.html" ]; then
              echo "Copying static site $name..."
              cp -r "$dir" "_site/$name"
            else
              echo "Skipping $name (no package.json or index.html)"
            fi

            echo "::endgroup::"
          done

      - name: Generate index page
        env:
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os

          repo = os.environ["REPO"]          # e.g. "m0oz/Scratch"
          repo_name = repo.split("/")[1]     # e.g. "Scratch"

          projects = sorted([
              d for d in os.listdir("_site")
              if os.path.isdir(f"_site/{d}") and not d.startswith("_")
          ])

          if projects:
              links = "\n".join(
                  f'      <li><a href="/{repo_name}/{p}/">{p}</a></li>'
                  for p in projects
              )
          else:
              links = '      <li class="empty">No prototypes yet — ask Claude to build one!</li>'

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Prototypes</title>
            <style>
              * {{ box-sizing: border-box; margin: 0; padding: 0; }}
              body {{
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f5f5f7;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 48px 20px;
              }}
              .card {{
                background: white;
                border-radius: 16px;
                padding: 32px;
                width: 100%;
                max-width: 480px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.08);
              }}
              h1 {{ font-size: 1.4rem; font-weight: 600; margin-bottom: 20px; color: #1d1d1f; }}
              ul {{ list-style: none; }}
              li {{ border-top: 1px solid #f0f0f0; }}
              li:first-child {{ border-top: none; }}
              a {{
                display: block;
                padding: 14px 0;
                text-decoration: none;
                color: #0071e3;
                font-size: 1rem;
              }}
              a:hover {{ color: #0077ed; }}
              .empty {{ padding: 14px 0; color: #86868b; font-size: 0.95rem; }}
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Web Prototypes</h1>
              <ul>
          {links}
              </ul>
            </div>
          </body>
          </html>"""

          # Strip the 10-space indent added by the heredoc
          cleaned = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in html.split("\n")
          )

          with open("_site/index.html", "w") as f:
              f.write(cleaned)

          print(f"Index generated — {len(projects)} project(s): {projects}")
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
